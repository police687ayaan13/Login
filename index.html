<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Login-Screen</title>
</head>
<body>
    <div class="login">
        <form action="">
        <h1 class="logintxt" >Login</h1>
        <div class="username">
            <input class="username1" type="text"placeholder="Username" required>
            
        </div>
        <div class="password" >
            <input class="password1" type="password" placeholder="Password" required>
            
        </div>
        <div>
            <input id="label" class="remember" type="checkbox">
            <label for="label">Remember Me</label>
            <span class="Forgot" >Forgot Password</span>
        </div>
        <div class="loginbtn">
            <button type="submit" class="logindown">Login</button>
        </div>
        <div class="register"><span class="dont" >Dont Have account?</span> <span class="register1" >Register</span></div>
        </form>
    </div>
</body>
</html>
